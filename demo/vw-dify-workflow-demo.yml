          \        result[\"message\"] = f\"查询成功，共{len(orders)}条订单\"\n        result[\"\
          ai_agent_manager_orders\"] = orders\n        result[\"ai_agent_manager_orders_text\"\
          ] = format_orders_text(orders)\n        \n        return result\n      \
          \  \n    except Exception as e:\n        result[\"message\"] = f\"处理订单查询时发生错误:\
          \ {str(e)}\"\n        return result\n\ndef main(params: Dict[str, Any],\
          \ dhb_skey: str, current_manager_api: str) -> Dict[str, Any]:\n    \"\"\"\
          \n    Dify工作流主函数 - 订单查询逻辑\n    \n    Args:\n        params: 查询参数字典\n   \
