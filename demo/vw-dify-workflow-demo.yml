            F→ 自主下单

             

            使用示例

            用户说“查看代客下单的订单” → 提取 is_admin_order: T

            用户说“自主下单的订单有哪些” → 提取 is_admin_order: F

            用户说“帮我查一下代客下单的订单” → 提取 is_admin_order: T

            用户说“不是代客下单的订单” → 提取 is_admin_order: F

            用户说“客户自己下单的订单” → 提取 is_admin_order: F

            </skill>

             

             

            ### 按结算方式查询

             

            <skill>

            参数

            clearing_form：结算方式，字符串，无默认值，单选。

            状态映射

            prepaid→ 预付

            forward→ 现付

            postpaid→ 后付

             

            使用示例

            用户说“查看预付的订单” → 提取 clearing_form: "prepaid"

            用户说“现付的订单有哪些” → 提取 clearing_form: "forward"

            用户说“后付的订单” → 提取 clearing_form: "postpaid"

            用户说“帮我查一下预付的订单” → 提取 clearing_form: "prepaid"

            用户说“不是现付的订单” → 注意：这里需要逻辑处理，但本参数为单选，通常不用于否定查询，如用户明确要求非现付，可结合其他参数或转换为查询“预付”或“后付”

            </skill>

             

             

            ### 按促销类型查询

             

            <skill>

            参数

            orders_type：促销类型，字符串，无默认值，单选。

            状态映射

            special→ 特批

