# cargo-deny configuration — v2 schema
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# In v2, vulnerability advisories always emit errors (not configurable).
# unmaintained: scope of unmaintained-crate checks (all | workspace | transitive | none)
unmaintained = "all"
# yanked: deny | warn | allow
yanked = "deny"
# Ignore known unmaintained transitive deps we cannot easily replace
ignore = [
    { id = "RUSTSEC-2025-0141", reason = "Transitive via probe-rs in current release path; tracked for replacement when probe-rs updates." },
    { id = "RUSTSEC-2024-0384", reason = "Reported to `rust-nostr/nostr` and it's WIP" },
    { id = "RUSTSEC-2024-0320", reason = "Transitive via syntect in the desktop syntax highlighting path; no safe upstream upgrade is available." },
    { id = "RUSTSEC-2024-0370", reason = "Transitive via gtk3-rs macro chain under wry/tao Linux webview support; no safe upstream upgrade is available." },
    { id = "RUSTSEC-2024-0411", reason = "Transitive via tao Linux webview support; gtk3-rs has no safe upstream upgrade in the current release line." },
    { id = "RUSTSEC-2024-0412", reason = "Transitive via wry/tao Linux webview support; gtk3-rs has no safe upstream upgrade in the current release line." },
    { id = "RUSTSEC-2024-0413", reason = "Transitive via wry/tao Linux webview support; gtk3-rs has no safe upstream upgrade in the current release line." },
    { id = "RUSTSEC-2024-0414", reason = "Transitive via wry/tao Linux webview support; gtk3-rs has no safe upstream upgrade in the current release line." },
    { id = "RUSTSEC-2024-0415", reason = "Transitive via wry/tao Linux webview support; gtk3-rs has no safe upstream upgrade in the current release line." },
    { id = "RUSTSEC-2024-0416", reason = "Transitive via wry/tao Linux webview support; gtk3-rs has no safe upstream upgrade in the current release line." },
    { id = "RUSTSEC-2024-0417", reason = "Transitive via wry Linux webview support; gtk3-rs has no safe upstream upgrade in the current release line." },
    { id = "RUSTSEC-2024-0418", reason = "Transitive via wry/tao Linux webview support; gtk3-rs has no safe upstream upgrade in the current release line." },
    { id = "RUSTSEC-2024-0419", reason = "Transitive via gtk3-rs macro chain under wry/tao Linux webview support; no safe upstream upgrade is available." },
    { id = "RUSTSEC-2024-0420", reason = "Transitive via wry/tao Linux webview support; gtk3-rs has no safe upstream upgrade in the current release line." },
    { id = "RUSTSEC-2024-0436", reason = "Transitive via wgpu/rav1e/rmcp in current release path; no safe upstream upgrade is available." },
    { id = "RUSTSEC-2025-0057", reason = "Transitive via kuchikiki/selectors under wry webview support; no safe upstream upgrade is available." },
]

[licenses]
# All licenses are denied unless explicitly allowed
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
]
unused-allowed-license = "allow"
exceptions = [
    { allow = ["MITNFA"], crate = "hex_lit" },
    { allow = ["GPL-3.0-or-later"], crate = "html2md" },
    { allow = ["NCSA"], crate = "libfuzzer-sys" },
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
